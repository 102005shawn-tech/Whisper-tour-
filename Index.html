<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisper Tour - 智慧導覽無線電</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/livekit-client@1.15.4/dist/livekit-client.umd.min.js"></script>
    <style>
        /* 針對點擊對講機按鈕時的特殊微動效能優化 */
        .ptt-active {
            transform: scale(0.96);
            box-shadow: 0 0 40px rgba(239, 68, 68, 0.7), inset 0 4px 10px rgba(0,0,0,0.4) !important;
        }
    </style>
</head>
<body class="bg-gradient-to-b from-slate-900 via-blue-950 to-black text-slate-100 font-sans min-h-screen flex flex-col justify-between select-none">

    <header class="bg-slate-900/40 backdrop-blur-md py-4 px-6 flex justify-between items-center border-b border-slate-800/60 shadow-lg">
        <h1 class="text-xl font-bold text-cyan-400 tracking-wide flex items-center gap-1.5">🎙️ Whisper Tour</h1>
        <span class="text-xs bg-cyan-950/60 text-cyan-400 px-2.5 py-1 rounded-full font-bold border border-cyan-800/40">慈大經管 P104</span>
    </header>

    <main class="max-w-md w-full mx-auto px-4 py-8 flex-grow flex flex-col justify-center">

        <div id="screen-1" class="space-y-8">
            <div class="text-center space-y-2">
                <h2 class="text-4xl font-black text-white tracking-wider drop-shadow-[0_2px_10px_rgba(34,211,238,0.2)]">Whisper Tour</h2>
                <p class="text-slate-400 text-xs uppercase tracking-widest font-semibold">即時網頁無線電導覽系統</p>
            </div>

            <div class="grid grid-cols-1 gap-4">
                <button onclick="toScreen3()" class="bg-cyan-600 hover:bg-cyan-500 text-white p-6 rounded-2xl shadow-xl transition active:scale-98 flex flex-col items-center justify-center gap-3 cursor-pointer border border-cyan-500/30">
                    <span class="text-4xl">📢</span>
                    <div class="text-center">
                        <span class="text-xl font-bold tracking-wide block">我是導遊</span>
                        <span class="text-xs text-cyan-100/70 block mt-1">開啟房間、掌控麥克風發話</span>
                    </div>
                </button>

                <button onclick="switchScreen(2)" class="bg-slate-850/80 hover:bg-slate-800/80 text-white p-6 rounded-2xl shadow-xl transition active:scale-98 flex flex-col items-center justify-center gap-3 cursor-pointer border border-slate-700/50 backdrop-blur-sm">
                    <span class="text-4xl">🎧</span>
                    <div class="text-center">
                        <span class="text-xl font-bold tracking-wide block">我是遊客</span>
                        <span class="text-xs text-slate-400 block mt-1">輸入房號暱稱、守聽導覽語音</span>
                    </div>
                </button>
            </div>
        </div>

        <div id="screen-2" class="hidden space-y-6">
            <button onclick="switchScreen(1)" class="text-slate-400 hover:text-slate-200 font-bold text-base p-2 cursor-pointer">← 返回</button>
            
            <div class="bg-slate-900/60 backdrop-blur-md p-6 rounded-2xl shadow-2xl border border-slate-800 space-y-5">
                <h3 class="text-xl font-bold text-white text-center border-b border-slate-800 pb-3">遊客登入頻道</h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-1.5 uppercase">請輸入房號</label>
                        <input type="text" id="inputRoomCode" placeholder="請輸入 4 位數房號" maxlength="4" class="w-full px-4 py-3 border border-slate-700 rounded-xl text-center font-mono text-xl tracking-widest focus:ring-2 focus:ring-cyan-500 focus:outline-none bg-slate-950 text-cyan-400">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-1.5 uppercase">請輸入暱稱</label>
                        <input type="text" id="inputNickname" placeholder="例如：阿翔" class="w-full px-4 py-3 border border-slate-700 rounded-xl text-center text-base focus:ring-2 focus:ring-cyan-500 focus:outline-none bg-slate-950 text-white">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-cyan-500 mb-1.5 uppercase">請輸入 LiveKit Token</label>
                        <input type="text" id="touristToken" placeholder="貼上 LiveKit 生成的遊客 Token" class="w-full px-4 py-2 border border-slate-800 rounded-xl text-xs focus:outline-none bg-slate-950/50 text-slate-400 font-mono">
                    </div>
                </div>
                <button onclick="enterTouristChannel()" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3.5 rounded-xl transition shadow-lg shadow-cyan-950 cursor-pointer">確認加入頻道</button>
            </div>
        </div>

        <div id="screen-3" class="hidden space-y-6">
            <button onclick="leaveRoom()" class="text-slate-400 hover:text-slate-200 font-bold text-base p-2 cursor-pointer">← 關閉房間</button>
            
            <div class="bg-slate-900/60 backdrop-blur-md p-6 rounded-3xl shadow-2xl border border-slate-800 space-y-6">
                
                <div class="bg-black/80 text-white p-4 rounded-2xl flex justify-around items-center font-mono shadow-inner border border-slate-900">
                    <div class="text-center">
                        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">房號 CHANNEL</p>
                        <p class="text-2xl font-black text-cyan-400 tracking-widest" id="displayRoomCode">----</p>
                    </div>
                    <div class="border-l border-slate-800 h-8"></div>
                    <div class="text-center">
                        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">收聽人數 LISTENERS</p>
                        <p class="text-2xl font-black text-cyan-400" id="displayListenerCount">0 <span class="text-xs font-normal text-slate-500">人</span></p>
                    </div>
                </div>

                <div class="flex items-center justify-center gap-2 text-xs text-slate-400 bg-slate-950/60 py-2 rounded-lg border border-slate-900">
                    <input type="checkbox" id="chkRandomCode" checked class="w-4 h-4 text-cyan-600 border-slate-700 bg-slate-950 rounded focus:ring-cyan-500 cursor-pointer">
                    <label for="chkRandomCode" class="cursor-pointer font-semibold">隨機產生房號 (預設勾選)</label>
                </div>

                <div class="py-4 flex flex-col items-center gap-4">
                    <div class="flex items-center gap-2 bg-slate-950 px-3 py-1 rounded-full border border-slate-900">
                        <span id="txSignalLight" class="w-2.5 h-2.5 rounded-full bg-slate-600"></span>
                        <span id="txStatusText" class="text-[11px] font-bold text-slate-400 tracking-widest font-mono">DISCONNECTED</span>
                    </div>

                    <button id="mainMicBtn" disabled
                            onmousedown="startTransmission()" onmouseup="stopTransmission()"
                            ontouchstart="startTransmission(event)" ontouchend="stopTransmission(event)"
                            class="w-44 h-44 bg-slate-950 text-slate-600 rounded-full flex flex-col items-center justify-center border-[12px] border-slate-900 shadow-2xl opacity-50 cursor-not-allowed select-none transition-all duration-75">
                        <span class="text-5xl" id="micEmoji">🔒</span>
                        <span class="text-xs font-black mt-3 tracking-widest uppercase" id="micBtnText">未連線</span>
                    </button>
                    <p class="text-[11px] text-slate-400 font-medium text-center max-w-[250px]" id="guideTip">請先填入 Token 並點擊上方按鈕連線</p>
                </div>

                <div class="space-y-1 bg-slate-950/80 p-3 rounded-xl border border-slate-900">
                    <label class="block text-[11px] font-bold text-cyan-500 uppercase">請填入導遊 Token</label>
                    <input type="text" id="guideToken" placeholder="貼上 LiveKit 生成的導遊 Token" class="w-full px-3 py-1.5 border border-slate-800 rounded-lg text-xs focus:outline-none bg-black text-slate-300 font-mono">
                    <button onclick="connectAsGuide()" class="w-full mt-2 bg-cyan-700 hover:bg-cyan-600 text-white text-xs font-bold py-2 rounded-lg transition shadow-md shadow-cyan-950">連線至 LiveKit 語音伺服器</button>
                </div>
            </div>
        </div>

        <div id="screen-tourist-live" class="hidden space-y-6">
            <button onclick="leaveRoom()" class="text-slate-400 hover:text-slate-200 font-bold text-base p-2 cursor-pointer">← 退出頻道</button>
            
            <div class="bg-black/60 backdrop-blur-md p-6 rounded-3xl shadow-2xl border border-slate-900 text-center space-y-6">
                <div class="flex justify-between items-center border-b border-slate-900 pb-3 font-mono text-xs">
                    <span id="liveRoomInfo" class="text-cyan-400 font-bold tracking-wider">CH: ----</span>
                    <span id="liveNickInfo" class="text-slate-400">USER: ----</span>
                </div>

                <div class="py-12 bg-slate-950/80 rounded-2xl border border-slate-900 space-y-6 shadow-inner">
                    <div class="flex justify-center items-center gap-1.5 h-10" id="liveWave">
                        <span class="w-1 bg-slate-900 h-3 rounded-full"></span>
                        <span class="w-1 bg-slate-900 h-3 rounded-full"></span>
                        <span class="w-1 bg-slate-900 h-3 rounded-full"></span>
                    </div>
                    <div>
                        <p class="text-base font-bold text-slate-500 tracking-wide" id="rxStatus">正在連線至頻道...</p>
                        <p class="text-xs text-slate-600 mt-1" id="rxSubStatus">請稍候</p>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <footer class="text-center py-4 text-[11px] text-slate-500 border-t border-slate-900/60 bg-black/20 w-full backdrop-blur-xs">
        © 2026 智慧商情研究室 | 好玩實驗室
    </footer>

    <script>
        const LIVEKIT_SERVER_URL = "wss://YOUR_PROJECT.livekit.cloud";

        let currentRoom = null;
        let currentRoomCode = "";
        let countInterval = null;

        function switchScreen(screenNum) {
            document.getElementById('screen-1').classList.add('hidden');
            document.getElementById('screen-2').classList.add('hidden');
            document.getElementById('screen-3').classList.add('hidden');
            document.getElementById('screen-tourist-live').classList.add('hidden');

            if (screenNum === 1) document.getElementById('screen-1').classList.remove('hidden');
            if (screenNum === 2) document.getElementById('screen-2').classList.remove('hidden');
            if (screenNum === 3) document.getElementById('screen-3').classList.remove('hidden');
            if (screenNum === 'tourist-live') document.getElementById('screen-tourist-live').classList.remove('hidden');
        }

        function toScreen3() {
            switchScreen(3);
            currentRoomCode = "104"; 
            document.getElementById('displayRoomCode').innerText = currentRoomCode;
        }

        // 導遊端：連線與發話控制
        async function connectAsGuide() {
            const token = document.getElementById('guideToken').value.trim();
            if (!token) return alert("請輸入導遊 Token！");

            try {
                document.getElementById('txStatusText').innerText = "CONNECTING...";
                currentRoom = new LiveKitClient.Room();
                await currentRoom.connect(LIVEKIT_SERVER_URL, token);
                
                document.getElementById('txStatusText').innerText = "STANDBY (守聽)";
                const btn = document.getElementById('mainMicBtn');
                btn.disabled = false;
                btn.className = "w-44 h-44 bg-slate-900 text-cyan-400 rounded-full flex flex-col items-center justify-center border-[12px] border-slate-950 shadow-2xl shadow-cyan-950/20 border-cyan-950/40 cursor-pointer select-none transition-all duration-75";
                document.getElementById('micEmoji').innerText = "🎙️";
                document.getElementById('micBtnText').innerText = "按住發話";
                document.getElementById('micBtnText').className = "text-xs font-black mt-3 tracking-widest uppercase text-cyan-400";
                document.getElementById('guideTip').innerHTML = "無線電已上線！<br>按住按鈕發話，放開自動靜音。";

                startListenerCountLoop();
            } catch (err) {
                alert("連線失敗: " + err.message);
                document.getElementById('txStatusText').innerText = "DISCONNECTED";
            }
        }

        // 按住發話 (PTT ON)
        async function startTransmission(e) {
            if(e) e.preventDefault();
            if (!currentRoom) return;

            const btn = document.getElementById('mainMicBtn');
            btn.style.backgroundColor = "#ef4444";
            btn.style.borderColor = "#7f1d1d";
            document.getElementById('micEmoji').innerText = "🔴";
            document.getElementById('micBtnText').innerText = "正在發話";
            document.getElementById('micBtnText').className = "text-xs font-black mt-3 tracking-widest uppercase text-white";
            document.getElementById('txSignalLight').className = "w-2.5 h-2.5 rounded-full bg-red-500 shadow-[0_0_10px_#ef4444]";
            document.getElementById('txStatusText').innerText = "TRANSMIT (TX)";
            document.getElementById('txStatusText').className = "text-[11px] font-bold text-red-500 tracking-widest font-mono";

            await currentRoom.localParticipant.setMicrophoneEnabled(true);
        }

        // 放開靜音 (PTT OFF)
        async function stopTransmission(e) {
            if(e) e.preventDefault();
            if (!currentRoom) return;

            const btn = document.getElementById('mainMicBtn');
            btn.style.backgroundColor = "#030712";
            btn.style.borderColor = "#020617";
            document.getElementById('micEmoji').innerText = "🎙️";
            document.getElementById('micBtnText').innerText = "按住發話";
            document.getElementById('micBtnText').className = "text-xs font-black mt-3 tracking-widest uppercase text-cyan-400";
            document.getElementById('txSignalLight').className = "w-2.5 h-2.5 rounded-full bg-slate-600";
            document.getElementById('txStatusText').innerText = "STANDBY (守聽)";
            document.getElementById('txStatusText').className = "text-[11px] font-bold text-slate-400 tracking-widest font-mono";

            await currentRoom.localParticipant.setMicrophoneEnabled(false);
        }

        // 遊客端：連線與守聽
        async function enterTouristChannel() {
            const code = document.getElementById('inputRoomCode').value.trim();
            const nick = document.getElementById('inputNickname').value.trim();
            const token = document.getElementById('touristToken').value.trim();

            if (!code || !nick || !token) return alert('房號、暱稱與 Token 都要填寫！');

            document.getElementById('liveRoomInfo').innerText = `CH: ${code}`;
            document.getElementById('liveNickInfo').innerText = `USER: ${nick}`;
            switchScreen('tourist-live');

            try {
                currentRoom = new LiveKitClient.Room();
                
                currentRoom.on(LiveKitClient.RoomEvent.TrackSubscribed, (track) => {
                    if (track.kind === 'audio') {
                        track.attach();
                        document.getElementById('rxStatus').innerText = "🔊 導遊正在發話...";
                        document.getElementById('rxStatus').className = "text-base font-bold text-cyan-400 tracking-wide animate-pulse";
                        toggleWaveAnimation(true);
                    }
                });

                currentRoom.on(LiveKitClient.RoomEvent.TrackUnsubscribed, (track) => {
                    if (track.kind === 'audio') {
                        document.getElementById('rxStatus').innerText = "頻道安靜中 (STANDBY)";
                        document.getElementById('rxStatus').className = "text-base font-bold text-slate-500 tracking-wide";
                        toggleWaveAnimation(false);
                    }
                });

                await currentRoom.connect(LIVEKIT_SERVER_URL, token);
                document.getElementById('rxStatus').innerText = "頻道安靜中 (STANDBY)";
                document.getElementById('rxSubStatus').innerText = "已成功進入無線電頻道";
            } catch (err) {
                alert("遊客連線失敗: " + err.message);
                switchScreen(2);
            }
        }

        function startListenerCountLoop() {
            countInterval = setInterval(() => {
                if (currentRoom) {
                    const count = currentRoom.participants.size;
                    document.getElementById('displayListenerCount').innerHTML = `${count} <span class="text-xs font-normal text-slate-500">人</span>`;
                }
            }, 2000);
        }

        let waveInterval;
        function toggleWaveAnimation(run) {
            const spans = document.querySelectorAll('#liveWave span');
            clearInterval(waveInterval);
            if (run) {
                waveInterval = setInterval(() => {
                    spans.forEach(s => {
                        s.style.height = `${Math.floor(Math.random() * 30) + 8}px`;
                        s.className = "w-1 bg-cyan-400 rounded-full transition-all duration-75 shadow-[0_0_10px_rgba(34,211,238,0.5)]";
                    });
                }, 100);
            } else {
                spans.forEach(s => {
                    s.style.height = `6px`;
                    s.className = "w-1 bg-slate-800 rounded-full transition-all duration-150";
                });
            }
        }

        function leaveRoom() {
            if (currentRoom) {
                currentRoom.disconnect();
                currentRoom = null;
            }
            clearInterval(countInterval);
            toggleWaveAnimation(false);
            switchScreen(1);
        }
    </script>
</body>
</html>
