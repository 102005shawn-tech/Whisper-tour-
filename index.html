<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Whisper Tour</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- LiveKit -->
  <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.js"></script>
  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-black text-white min-h-screen flex items-center justify-center">

  <div class="w-full max-w-md p-6">

    <!-- 首頁 -->
    <div id="screen-1">

      <h1 class="text-4xl font-bold mb-8 text-center">
        Whisper Tour
      </h1>

      <div class="space-y-4">

        <button
          onclick="toGuideScreen()"
          class="w-full bg-cyan-600 p-4 rounded-xl font-bold"
        >
          我是導遊
        </button>

        <button
          onclick="switchScreen(2)"
          class="w-full bg-gray-800 p-4 rounded-xl font-bold"
        >
          我是遊客
        </button>

      </div>
    </div>

    <!-- 遊客 -->
    <div id="screen-2" class="hidden">

      <button onclick="switchScreen(1)" class="mb-4">
        ← 返回
      </button>

      <div class="space-y-4">

        <input
          id="inputRoomCode"
          placeholder="輸入房號"
          class="w-full p-3 rounded bg-gray-900"
        >

        <input
          id="inputNickname"
          placeholder="輸入暱稱"
          class="w-full p-3 rounded bg-gray-900"
        >

        <button
          onclick="enterTouristChannel()"
          class="w-full bg-cyan-600 p-4 rounded-xl font-bold"
        >
          加入頻道
        </button>

      </div>

      <p id="rxStatus" class="mt-4 text-center text-cyan-400"></p>

    </div>

    <!-- 導遊 -->
    <div id="screen-3" class="hidden">

      <button onclick="switchScreen(1)" class="mb-4">
        ← 返回
      </button>

      <div class="text-center">

        <h2 class="text-6xl font-bold mb-6" id="displayRoomCode">
          1111
        </h2>

        <button
          id="mainMicBtn"
          disabled
          onmousedown="startTransmission()"
          onmouseup="stopTransmission()"
          ontouchstart="startTransmission(event)"
          ontouchend="stopTransmission(event)"
          class="w-48 h-48 rounded-full bg-gray-800 mx-auto text-4xl"
        >
          🎙️
        </button>

        <p id="txStatusText" class="mt-6 text-cyan-400">
          未連線
        </p>

        <button
          onclick="connectAsGuide()"
          class="mt-6 bg-cyan-600 px-6 py-3 rounded-xl font-bold"
        >
          開始連線
        </button>

      </div>

    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
