<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisper Tour - 智慧導覽無線電</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/livekit-client@1.15.4/dist/livekit-client.umd.min.js"></script>
</head>
<body class="bg-gradient-to-b from-slate-900 via-blue-950 to-black text-slate-100 font-sans min-h-screen flex flex-col justify-between select-none">

    <header class="bg-slate-900/40 backdrop-blur-md py-4 px-6 flex justify-between items-center border-b border-slate-800/60 shadow-lg">
        <h1 class="text-xl font-bold text-cyan-400 tracking-wide flex items-center gap-1.5">🎙️ Whisper Tour</h1>
        <span class="text-xs bg-cyan-950/60 text-cyan-400 px-2.5 py-1 rounded-full font-bold border border-cyan-800/40">慈大經管 P104</span>
    </header>

    <main class="max-w-md w-full mx-auto px-4 py-8 flex-grow flex flex-col justify-center">

        <div id="screen-1" class="space-y-8">
            <div class="text-center space-y-2">
                <h2 class="text-4xl font-black text-white tracking-wider drop-shadow-[0_2px_10px_rgba(34,211,238,0.2)]">Whisper Tour</h2>
                <p class="text-slate-400 text-xs uppercase tracking-widest font-semibold">即時網頁無線電導覽系統</p>
            </div>

            <div class="grid grid-cols-1 gap-4">
                <button onclick="toScreen3()" class="bg-cyan-600 hover:bg-cyan-500 text-white p-6 rounded-2xl shadow-xl transition active:scale-98 flex flex-col items-center justify-center gap-3 cursor-pointer border border-cyan-500/30">
                    <span class="text-4xl">📢</span>
                    <div class="text-center">
                        <span class="text-xl font-bold tracking-wide block">我是導遊</span>
                        <span class="text-xs text-cyan-100/70 block mt-1">開啟房間、掌控麥克風發話</span>
                    </div>
                </button>

                <button onclick="switchScreen(2)" class="bg-slate-850/80 hover:bg-slate-800/80 text-white p-6 rounded-2xl shadow-xl transition active:scale-98 flex flex-col items-center justify-center gap-3 cursor-pointer border border-slate-700/50 backdrop-blur-sm">
                    <span class="text-4xl">🎧</span>
                    <div class="text-center">
                        <span class="text-xl font-bold tracking-wide block">我是遊客</span>
                        <span class="text-xs text-slate-400 block mt-1">輸入房號暱稱、守聽導覽語音</span>
                    </div>
                </button>
            </div>
        </div>

        <div id="screen-2" class="hidden space-y-6">
            <button onclick="switchScreen(1)" class="text-slate-400 hover:text-slate-200 font-bold text-base p-2 cursor-pointer">← 返回</button>
            
            <div class="bg-slate-900/60 backdrop-blur-md p-6 rounded-2xl shadow-2xl border border-slate-800 space-y-5">
                <h3 class="text-xl font-bold text-white text-center border-b border-slate-800 pb-3">遊客登入頻道</h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-1.5 uppercase">請輸入房號</label>
                        <input type="text" id="inputRoomCode" placeholder="請輸入 4 位數房號" maxlength="4" class="w-full px-4 py-3 border border-slate-700 rounded-xl text-center font-mono text-xl tracking-widest focus:ring-2 focus:ring-cyan-500 focus:outline-none bg-slate-950 text-cyan-400">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-1.5 uppercase">請輸入暱稱</label>
                        <input type="text" id="inputNickname" placeholder="例如：阿翔" class="w-full px-4 py-3 border border-slate-700 rounded-xl text-center text-base focus:ring-2 focus:ring-cyan-500 focus:outline-none bg-slate-950 text-white">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-cyan-500 mb-1.5 uppercase">請輸入 LiveKit Token</label>
                        <input type="text" id="touristToken" placeholder="貼上 LiveKit 生成的遊客 Token" class="w-full px-4 py-2 border border-slate-800 rounded-xl text-xs focus:outline-none bg-slate-950/50 text-slate-400 font-mono">
                    </div>
                </div>
                <button onclick="enterTouristChannel()" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3.5 rounded-xl transition shadow-lg shadow-cyan-950 cursor-pointer">確認加入頻道</button>
            </div>
        </div>

        <div id="screen-3" class="hidden space-y-6">
            <button onclick="leaveRoom()" class="text-slate-400 hover:text-slate-200 font-bold text-base p-2 cursor-pointer">← 關閉房間</button>
            
            <div class="bg-slate-900/60 backdrop-blur-md p-6 rounded-3xl shadow-2xl border border-slate-800 space-y-6">
                <div class="bg-black/80 text-white p-4 rounded-2xl flex justify-around items-center font-mono shadow-inner border border-slate-900">
                    <div class="text-center">
                        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">房號 CHANNEL</p>
                        <p class="text-2xl font-black text-cyan-400 tracking-widest" id="displayRoomCode">----</p>
                    </div>
                    <div class="border-l border-slate-800 h-8"></div>
                    <div class="text-center">
                        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">收聽人數 LISTENERS</p>
                        <p class="text-2xl font-black text-cyan-400" id="displayListenerCount">0 <span class="
